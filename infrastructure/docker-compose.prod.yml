name: aptghana-prod

networks:
  proxy:
    name: aptghana-proxy
  internal:
    name: aptghana-internal
    internal: true

volumes:
  mongodb-data:
  meilisearch-data:
  minio-data:
  traefik-acme:
  mongodb-backups:

services:
  # ─── Reverse Proxy + SSL ──────────────────────────────────────────────────────
  # Uses file provider (no Docker socket) to avoid Docker API version issues.
  # Routes and middlewares are defined in traefik/dynamic.yml.
  traefik:
    image: traefik:v3.2
    container_name: aptghana-traefik
    restart: unless-stopped
    networks: [proxy]
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m
    command:
      - --api.dashboard=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --log.level=INFO
    volumes:
      - traefik-acme:/acme
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/.htpasswd:/auth/.htpasswd:ro

  # ─── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0.21
    container_name: aptghana-mongodb
    restart: unless-stopped
    networks: [internal]
    # No ports: block — MongoDB must NOT be reachable from outside the Docker network.
    # Vercel connects via Atlas; on-VPS apps connect through the aptghana-internal network.
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
      MONGO_APP_USER: ${MONGO_APP_USER}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    volumes:
      - mongodb-data:/data/db
      - mongodb-backups:/backups
      - ./mongodb/mongod.conf:/etc/mongod.conf:ro
      - ./mongodb/init:/docker-entrypoint-initdb.d:ro
    command: mongod --config /etc/mongod.conf
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536m

  # ─── Meilisearch ──────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: aptghana-meilisearch
    restart: unless-stopped
    networks: [proxy]
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
      MEILI_MAX_INDEXING_MEMORY: 256Mb
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768m

  # ─── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: aptghana-minio
    restart: unless-stopped
    networks: [proxy, internal]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: assets.${DOMAIN}
      MINIO_SITE_NAME: aptghana-assets
      MINIO_BROWSER_REDIRECT_URL: https://storage-console.${DOMAIN}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 384m

  # ─── MinIO Bootstrap (one-shot bucket creation) ───────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    container_name: aptghana-minio-init
    networks: [internal]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_APP_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_APP_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/aptghana-assets &&

        mc anonymous set download local/aptghana-assets/products &&
        mc anonymous set download local/aptghana-assets/brands &&
        mc anonymous set download local/aptghana-assets/categories &&
        mc anonymous set download local/aptghana-assets/homepage &&
        mc anonymous set download local/aptghana-assets/marketing &&

        mc admin user add local $$MINIO_APP_ACCESS_KEY $$MINIO_APP_SECRET_KEY &&

        printf '{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"s3:ListBucket\"],\"Resource\":[\"arn:aws:s3:::aptghana-assets\"]},{\"Effect\":\"Allow\",\"Action\":[\"s3:GetObject\",\"s3:PutObject\",\"s3:DeleteObject\"],\"Resource\":[\"arn:aws:s3:::aptghana-assets/products/*\",\"arn:aws:s3:::aptghana-assets/brands/*\",\"arn:aws:s3:::aptghana-assets/categories/*\",\"arn:aws:s3:::aptghana-assets/homepage/*\",\"arn:aws:s3:::aptghana-assets/marketing/*\",\"arn:aws:s3:::aptghana-assets/rfq-attachments/*\",\"arn:aws:s3:::aptghana-assets/assets/*\"]}]}' > /tmp/app-policy.json &&
        mc admin policy create local aptghana-app-policy /tmp/app-policy.json &&
        mc admin policy attach local aptghana-app-policy --user $$MINIO_APP_ACCESS_KEY &&

        echo 'MinIO initialization complete'
      "
    restart: "no"

  # ─── Scheduled Backups ────────────────────────────────────────────────────────
  mongodb-backup:
    image: mongo:7.0.21
    container_name: aptghana-backup
    restart: unless-stopped
    networks: [internal]
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      # Backup service uses a dedicated read-only user (aptghana_backup)
      # to prevent a compromised backup container from writing to the DB.
      MONGO_URI: mongodb://aptghana_backup:${MONGO_BACKUP_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=${MONGO_DB}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - mongodb-backups:/backups
      - ./scripts/backup-cron.sh:/backup.sh:ro
      - ./scripts/backup-scheduler.sh:/scheduler.sh:ro
    entrypoint: ["/bin/sh", "/scheduler.sh"]
