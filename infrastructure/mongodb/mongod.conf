storage:
  dbPath: /data/db
  wiredTiger:
    engineConfig:
      # 4GB RAM VPS: keep cache at 512MB so OS + other services have room
      cacheSizeGB: 0.5
      journalCompressor: snappy
    collectionConfig:
      blockCompressor: snappy
    indexConfig:
      prefixCompression: true

net:
  port: 27017
  # bindIp 0.0.0.0 is required for Docker inter-container communication.
  # External exposure is prevented by the absence of a `ports:` mapping in
  # docker-compose.prod.yml — MongoDB is only reachable within the
  # aptghana-internal Docker network.
  bindIp: 0.0.0.0
  maxIncomingConnections: 100

security:
  authorization: enabled

operationProfiling:
  slowOpThresholdMs: 500
  mode: slowOp
